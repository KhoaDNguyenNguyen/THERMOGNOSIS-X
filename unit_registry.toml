# unit_registry.toml
#
# THERMOGNOSIS-X — SI Unit Conversion Registry (GAP-02)
# ======================================================
# Document ID : GAP-02, UNIT_converter_spec.md, UNIT_registry_spec.md
# Status      : Normative — Q1 Dataset Standard
#
# This file maps every known unit string encountered in the Starrydata corpus
# to its SI equivalent via a multiplicative factor and optional additive offset.
#
# Conversion formula (affine):   si_value = raw_value * factor + offset
# For pure scaling:               si_value = raw_value * factor   (offset = 0.0)
# For temperature offset (°C→K): si_value = raw_value * 1.0 + 273.15
#
# ENFORCEMENT: The Rust UnitConverter (GAP-02) loads this file at startup.
# Any unit string NOT present here causes FLAG_UNIT_UNKNOWN to be set on the
# affected record, which is then excluded from the clean Parquet output.
#
# Sources:
#   - IUPAC Green Book, 3rd Edition (2007 / 2024 update)
#   - Starrydata2 corpus unit survey (internal analysis, 2025)
#   - Snyder & Toberer, Nature Materials 7, 105–114 (2008)

[metadata]
version = "1.0.0"
created = "2026-03-05"
authors = ["THERMOGNOSIS Research Group"]

# ============================================================================
# SEEBECK COEFFICIENT (propertyid = 2)
# SI unit: V/K
# ============================================================================

[[unit]]
raw_string = "V/K"
property = "Seebeck"
si_unit = "V/K"
factor = 1.0
offset = 0.0
note = "Already in SI."

[[unit]]
raw_string = "mV/K"
property = "Seebeck"
si_unit = "V/K"
factor = 1.0e-3
offset = 0.0

[[unit]]
raw_string = "uV/K"
property = "Seebeck"
si_unit = "V/K"
factor = 1.0e-6
offset = 0.0

[[unit]]
raw_string = "µV/K"
property = "Seebeck"
si_unit = "V/K"
factor = 1.0e-6
offset = 0.0
note = "Unicode mu — identical factor to uV/K."

[[unit]]
raw_string = "μV/K"
property = "Seebeck"
si_unit = "V/K"
factor = 1.0e-6
offset = 0.0
note = "Alternative Unicode mu."

[[unit]]
raw_string = "V K-1"
property = "Seebeck"
si_unit = "V/K"
factor = 1.0
offset = 0.0

[[unit]]
raw_string = "muV/K"
property = "Seebeck"
si_unit = "V/K"
factor = 1.0e-6
offset = 0.0

